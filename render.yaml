services:
  - type: web
    name: astrooracle-backend
    env: node
    region: oregon
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://astrooracle.space
      - key: RESEND_FROM_EMAIL
        value: cosmic@astrooracle.space
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: CORE_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ANNUAL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: WEBPUSHR_API_KEY
        sync: false
      - key: WEBPUSHR_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: INTERNAL_SECRET
        sync: false
