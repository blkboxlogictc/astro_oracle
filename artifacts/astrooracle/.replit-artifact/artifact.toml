kind = "web"
previewPath = "/"
title = "AstroOracle"
version = "1.0.0"
id = "artifacts/astrooracle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24335

[services.development]
run = "pnpm --filter @workspace/astrooracle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/astrooracle", "run", "build" ]
publicDir = "artifacts/astrooracle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24335"
BASE_PATH = "/"
